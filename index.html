<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tidal Realty Services</title>
  </head>
  <body class="fs-unmask-airo-app-builder">
    <!-- Static form for Netlify Forms build-time detection (required for SPA) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" style="position:absolute;left:-9999px;top:-9999px;visibility:hidden;">
      <input type="text" name="Full Name" />
      <input type="email" name="Email" />
      <input type="tel" name="Phone" />
      <input type="text" name="Interested In" />
      <input type="text" name="Property Address" />
      <textarea name="Message"></textarea>
      <input name="bot-field" />
    </form>
    <div id="app" class="fs-unmask-airo-app-builder"></div>
    <script type="module">
      if (import.meta.env.MODE === 'development') {
        import('/dev-tools/src/error-client.ts')
      }
      import('/src/main.tsx')
    </script>
    <script src="/analytics.js"></script>
  </body>
</html>
